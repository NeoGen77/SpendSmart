<ion-header>
  <ion-toolbar>
    <ion-title>
      Gérer le solde
    </ion-title>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  
  <!-- Formulaire pour modifier le solde principal -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>Modifier le solde principal</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-item>
        <ion-label position="floating">Nouveau solde </ion-label>
        <ion-input type="number" [(ngModel)]="nouveauSolde"></ion-input>
      </ion-item>
      <ion-button expand="full" (click)="modifierSolde()">Modifier le solde</ion-button>
    </ion-card-content>
  </ion-card>

  <!-- Formulaire pour ajouter un montant à part -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>Ajouter un montant</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-item>
        <ion-label position="floating">Montant à ajouter </ion-label>
        <ion-input type="number" [(ngModel)]="montantAAjouter"></ion-input>
      </ion-item>
      <ion-button expand="full" (click)="ajouterAuSolde()">Ajouter au solde</ion-button>
    </ion-card-content>
  </ion-card>

  <!-- Bouton pour réinitialiser le solde 
  <ion-button expand="full" color="danger" (click)="reinitialiserSolde()">Réinitialiser le solde</ion-button> -->
</ion-content>
